{% extends "base.html" %}
{% block title %}פתיחת כיתה - babook{% endblock %}

{% block content %}
<div class="py-3 classes">
  <h1 class="mb-1">פתיחת כיתה</h1>
  <p class="text-muted mb-3">תנו שם לכיתה. אחר כך תקבלו קישור וקוד QR לשליחה לתלמידים.</p>

  <form method="post" class="card-surface cls-form" style="max-width:560px">
    {% csrf_token %}
    <label class="cls-label" for="name">שם הכיתה</label>
    <input class="form-control mb-3" id="name" name="name" maxlength="120" required
           placeholder="לדוגמה: כיתה ז2 - מבוא לרובוטיקה">

    <label class="cls-label" for="description">תיאור (לא חובה)</label>
    <textarea class="form-control mb-3" id="description" name="description" rows="3"
              placeholder="על מה הכיתה, מתי נפגשים, וכל מה שחשוב לתלמידים לדעת."></textarea>

    <div class="d-flex gap-2">
      <button class="btn btn-primary">יצירת כיתה</button>
      <a href="{% url 'my_classes' %}" class="btn btn-outline-secondary">ביטול</a>
    </div>
  </form>
</div>
{% endblock %}
