{# Soft register note for logged-out readers (REQ-6.1.11, DEC-45). Dismissible per session. #}
{% if not user.is_authenticated %}
<div id="guest-note" class="alert alert-info py-2 small d-flex justify-content-between align-items-center flex-wrap gap-2" style="display:none !important;">
  <span><i class="bi bi-people"></i> אפשר לקרוא הכל בחופשיות. כדי להגיב, לדרג ולפרסם - הירשמו.</span>
  <span class="d-flex align-items-center gap-2">
    <a class="btn btn-sm btn-primary" href="/join/?next={{ request.get_full_path|urlencode }}">הצטרפו</a>
    <button type="button" class="btn btn-sm btn-link text-secondary p-0" aria-label="סגירת ההודעה"
            onclick="sessionStorage.setItem('guest_note_dismissed','1');document.getElementById('guest-note').remove();">✕</button>
  </span>
</div>
<script>
  if (!sessionStorage.getItem('guest_note_dismissed')) {
    document.getElementById('guest-note').style.setProperty('display', 'flex', 'important');
  }
</script>
{% endif %}
