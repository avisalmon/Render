{% extends "base.html" %}
{% block title %}אירוע חדש - babook{% endblock %}

{% block breadcrumb %}
<ol class="breadcrumb small mb-0">
  <li class="breadcrumb-item"><a href="{% url 'community' %}" style="color:var(--accent-primary)">קהילה</a></li>
  <li class="breadcrumb-item"><a href="{% url 'events_page' %}" style="color:var(--accent-primary)">אירועים</a></li>
  <li class="breadcrumb-item active" aria-current="page" style="color:var(--text-secondary)">חדש</li>
</ol>
{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-lg-7">
    <h1 class="h4 mb-3">{% if event %}עריכת אירוע{% else %}אירוע חדש{% endif %}</h1>
    <form method="post" class="card-surface p-4" action="{% if event %}{% url 'event_edit' event.slug %}{% else %}{% url 'event_create' %}{% endif %}">
      {% csrf_token %}
      <label class="form-label">כותרת</label>
      <input name="title" class="form-control mb-3" value="{{ event.title|default:'' }}" required>
      <div class="row g-3 mb-3">
        <div class="col-md-6"><label class="form-label small">סוג</label>
          <select name="event_type" class="form-select">
            <option value="ama" {% if event.event_type == 'ama' %}selected{% endif %}>AMA</option>
            <option value="live_coding" {% if event.event_type == 'live_coding' %}selected{% endif %}>לייב-קודינג</option>
            <option value="hackathon_kickoff" {% if event.event_type == 'hackathon_kickoff' %}selected{% endif %}>פתיחת האקתון</option>
            <option value="meetup" {% if event.event_type == 'meetup' %}selected{% endif %}>מפגש</option>
            <option value="conference" {% if event.event_type == 'conference' %}selected{% endif %}>כנס</option>
          </select></div>
        <div class="col-md-3"><label class="form-label small">התחלה</label>
          <input type="datetime-local" name="start_at" class="form-control" value="{{ event.start_at|date:'Y-m-d\TH:i' }}" required></div>
        <div class="col-md-3"><label class="form-label small">סיום</label>
          <input type="datetime-local" name="end_at" class="form-control" value="{{ event.end_at|date:'Y-m-d\TH:i' }}" required></div>
      </div>
      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" name="is_online" id="is-online" {% if event.is_online or not event %}checked{% endif %}>
        <label class="form-check-label" for="is-online">אונליין</label>
      </div>
      <input name="online_url" class="form-control mb-2" dir="ltr" placeholder="קישור (Zoom/Meet)" value="{{ event.online_url|default:'' }}">
      <input name="venue" class="form-control mb-3" placeholder="או מקום פיזי (כתובת)" value="{{ event.venue|default:'' }}">
      <div class="row g-3 mb-3">
        <div class="col-md-4"><label class="form-label small">קיבולת (0 = ללא הגבלה)</label>
          <input type="number" name="capacity" min="0" value="{{ event.capacity|default:0 }}" class="form-control"></div>
        <div class="col-md-4"><label class="form-label small">סדרה (אופציונלי)</label>
          <input name="series" class="form-control" value="{{ event.series.title|default:'' }}" placeholder="שעת מומחה עם אבי"></div>
        {% if event %}<div class="col-md-4"><label class="form-label small">מזהה הקלטה (Bunny)</label>
          <input name="recording_bunny_id" class="form-control" dir="ltr" value="{{ event.recording_bunny_id|default:'' }}"></div>{% endif %}
      </div>
      <label class="form-label">תיאור (Markdown)</label>
      <textarea name="description" rows="4" class="form-control mb-3">{{ event.description|default:'' }}</textarea>
      <button class="btn btn-primary">{% if event %}שמירה{% else %}יצירת אירוע{% endif %}</button>
      <a href="{% if event %}{% url 'event_detail' event.slug %}{% else %}{% url 'events_page' %}{% endif %}" class="btn btn-outline-secondary">ביטול</a>
    </form>
  </div>
</div>
{% endblock %}
