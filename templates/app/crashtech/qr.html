{% extends "base.html" %}
{% block title %}העלאת וידאו - {{ challenge.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-lg-5 text-center">
    <h1 class="h5 mb-1">{{ challenge.title }}</h1>
    <p class="text-muted small">{{ team.name }} · סרקו את הקוד כדי להעלות את הוידאו מהטלפון</p>
    <div class="card-surface p-4 d-inline-block">
      <img src="{{ qr_img }}" alt="QR upload" width="240" height="240">
    </div>
    <p class="small text-muted mt-3">או פתחו ישירות בטלפון:</p>
    <a href="{{ upload_url }}" class="small" dir="ltr">{{ upload_url }}</a>
    <div class="mt-3"><a href="{% url 'crashtech_detail' h.slug %}" class="btn btn-outline-secondary btn-sm">← חזרה לאירוע</a></div>
  </div>
</div>
{% endblock %}
