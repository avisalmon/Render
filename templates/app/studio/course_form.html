{% extends "base.html" %}
{% block title %}קורס חדש - אולפן{% endblock %}
{% block breadcrumb %}
<ol class="breadcrumb small mb-0">
  <li class="breadcrumb-item"><a href="{% url 'home' %}" style="color:var(--accent-primary)">בית</a></li>
  <li class="breadcrumb-item"><a href="{% url 'studio_home' %}" style="color:var(--accent-primary)">אולפן</a></li>
  <li class="breadcrumb-item active" aria-current="page" style="color:var(--text-secondary)">קורס חדש</li>
</ol>
{% endblock %}
{% block content %}
<div class="py-4" style="max-width:720px;margin:0 auto;">
  <h1 class="h4 mb-3">קורס חדש</h1>
  <form method="post" class="card-surface p-4">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">כותרת הקורס *</label>
      <input class="form-control" name="title" required>
    </div>
    <div class="mb-3">
      <label class="form-label">תיאור</label>
      <textarea class="form-control" name="description" rows="3"></textarea>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">תחום</label>
        <select class="form-select" name="domain" id="domain-select"></select>
      </div>
      <div class="col-md-6">
        <label class="form-label">מסלול</label>
        <select class="form-select" name="track" id="track-select"></select>
      </div>
    </div>
    <div class="row g-3 mt-0">
      <div class="col-md-6">
        <label class="form-label">רמה</label>
        <select class="form-select" name="difficulty">
          <option value="beginner">מתחילים</option>
          <option value="intermediate">בינוני</option>
          <option value="advanced">מתקדם</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">נתיב תמונה (static)</label>
        <input class="form-control" name="thumbnail" placeholder="course_thumbnails/slug.png">
      </div>
    </div>
    <button class="btn btn-primary mt-4">צור קורס</button>
  </form>
</div>
{{ domains|json_script:"domains-data" }}
<script>
(function(){
  var domains = JSON.parse(document.getElementById('domains-data').textContent);
  var dsel = document.getElementById('domain-select'), tsel = document.getElementById('track-select');
  domains.forEach(function(d){ var o=document.createElement('option'); o.value=d[0]; o.textContent=d[1]; dsel.appendChild(o); });
  function fillTracks(){
    tsel.innerHTML=''; var none=document.createElement('option'); none.value=''; none.textContent='(ללא מסלול)'; tsel.appendChild(none);
    var d = domains.find(function(x){return x[0]===dsel.value;});
    if(d){ d[2].forEach(function(t){ var o=document.createElement('option'); o.value=t[0]; o.textContent=t[1]; tsel.appendChild(o); }); }
  }
  dsel.addEventListener('change', fillTracks); fillTracks();
})();
</script>
{% endblock %}
