<!DOCTYPE html>
<html>
<head><title>mysite</title></head>
<body>
  <h1>mysite</h1>
  {% if user.is_authenticated %}
    <p>Hello, {{ user.username }}. <a href="{% url 'logout' %}">Logout</a></p>
  {% else %}
    <p>
      <a href="{% url 'login' %}">Login</a> |
      <a href="{% url 'register' %}">Register</a> |
      <a href="{% url 'socialaccount_signup' %}?next=/">Login with Google</a>
    </p>
  {% endif %}
</body>
</html>
