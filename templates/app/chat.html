{% extends "base.html" %}
{% block title %}AI Chat{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <h5>Sessions</h5>
            <ul class="list-group mb-3">
                {% for s in sessions %}
                <li class="list-group-item small">{{ s.context_type }} - {{ s.created_at|date:"M d" }}</li>
                {% empty %}
                <li class="list-group-item text-muted small">No sessions yet</li>
                {% endfor %}
            </ul>
            <button class="btn btn-sm btn-primary" id="new-session-btn">New Chat</button>
        </div>
        <div class="col-md-9">
            <div id="chat-widget" class="border rounded p-3" style="min-height: 400px;">
                <div id="chat-messages" style="max-height: 350px; overflow-y: auto;"></div>
                <form id="chat-form" class="mt-2">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" class="btn btn-primary">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
const chatForm = document.getElementById('chat-form');
const chatInput = document.getElementById('chat-input');
const chatMessages = document.getElementById('chat-messages');
let sessionId = null;

chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = chatInput.value.trim();
    if (!msg) return;
    appendMessage('user', msg);
    chatInput.value = '';
    try {
        const res = await fetch('/api/chat/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value},
            body: JSON.stringify({message: msg, session_id: sessionId})
        });
        const data = await res.json();
        if (res.ok) {
            sessionId = data.session_id;
            appendMessage('assistant', data.content);
        } else {
            appendMessage('assistant', data.error || 'Error');
        }
    } catch (err) {
        appendMessage('assistant', 'Network error.');
    }
});

function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'mb-2 ' + (role === 'user' ? 'text-end' : '');
    div.innerHTML = '<strong>' + (role === 'user' ? 'You' : 'AI') + ':</strong> ' + escapeHtml(text);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
{% endblock %}
