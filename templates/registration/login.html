{% extends "base.html" %}
{% load i18n %}

{% block title %}כניסה — babook{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="mb-4">כניסה</h1>
    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">כניסה</button>
      </form>
      <hr>
      <a class="btn btn-outline-secondary w-100" href="/accounts/google/login/?process=login&next=/">
        <i class="bi bi-google"></i> המשך עם גוגל
      </a>
    </div>
    <p class="text-center mt-3">
      <a href="{% url 'register' %}">אין חשבון? הירשמו</a>
    </p>
    <p class="text-center mt-2">
      <a href="/accounts/password/reset/">שכחתם את הסיסמא?</a>
    </p>
  </div>
</div>
{% endblock %}
