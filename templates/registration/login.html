{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Login" %} — babook{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="mb-4">{% trans "Login" %}</h1>
    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">{% trans "Login" %}</button>
      </form>
      <hr>
      <a class="btn btn-outline-secondary w-100" href="{% url 'socialaccount_signup' %}?next=/">
        <i class="bi bi-google"></i> {% trans "Continue with Google" %}
      </a>
    </div>
    <p class="text-center mt-3">
      <a href="{% url 'register' %}">{% trans "No account? Register" %}</a>
    </p>
    <p class="text-center">
      <a href="{% url 'account_reset_password' %}">{% trans "Forgot password?" %}</a>
    </p>
  </div>
</div>
{% endblock %}
