{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Register" %} — babook{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="mb-4">{% trans "Register" %}</h1>
    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">{% trans "Create account" %}</button>
      </form>
    </div>
    <p class="text-center mt-3">
      <a href="{% url 'login' %}">{% trans "Already have an account? Login" %}</a>
    </p>
  </div>
</div>
{% endblock %}
