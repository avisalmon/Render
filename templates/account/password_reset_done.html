{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Email Sent" %} - babook{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="mb-4">{% trans "Email Sent" %}</h1>
    <div class="card p-4 text-center">
      <i class="bi bi-envelope-check" style="font-size: 3rem; color: var(--bs-success);"></i>
      <p class="mt-3">{% trans "We sent you a password reset link. Check your inbox." %}</p>
    </div>
    <p class="text-center mt-3">
      <a href="{% url 'account_login' %}">{% trans "Back to login" %}</a>
    </p>
  </div>
</div>
{% endblock %}
