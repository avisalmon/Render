{% extends "base.html" %}

{% block title %}איפוס סיסמא - babook{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="mb-4">איפוס סיסמא</h1>
    <p>הזינו את כתובת האימייל שלכם ונשלח קישור לאיפוס הסיסמא.</p>
    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">שלח קישור לאיפוס</button>
      </form>
    </div>
    <p class="text-center mt-3">
      <a href="{% url 'account_login' %}">חזרה לכניסה</a>
    </p>
  </div>
</div>
{% endblock %}
