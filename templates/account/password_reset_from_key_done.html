{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %} — babook{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="mb-4">{% trans "Password Changed" %}</h1>
    <div class="card p-4 text-center">
      <i class="bi bi-check-circle" style="font-size: 3rem; color: var(--bs-success);"></i>
      <p class="mt-3">{% trans "Your password has been reset. You can now log in with your new password." %}</p>
      <a href="{% url 'account_login' %}" class="btn btn-primary w-100">{% trans "Login" %}</a>
    </div>
  </div>
</div>
{% endblock %}
