async function load() {
  render(parse(BACKLOG_MD));
}

function parse(md) {
  const lines = md.split(/\r?\n/);
  const epics = [];
  let curEpic = null, curSprint = null, inTable = false, headers = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    let m = line.match(/^##\s+(EPIC-[\w.-]+)\s+—\s+(.+)$/);
    if (m) {
      curEpic = { id: m[1], title: m[2].trim(), sprints: [] };
      epics.push(curEpic);
      curSprint = null; inTable = false;
      continue;
    }

    m = line.match(/^###\s+(SPR-[\w.-]+)\s+—\s+(.+)$/);
    if (m && curEpic) {
      curSprint = { id: m[1], title: m[2].trim(), features: [] };
      curEpic.sprints.push(curSprint);
      inTable = false;
      continue;
    }

    if (curSprint && /^\|\s*Feature ID\s*\|/i.test(line)) {
      inTable = true;
      headers = line.split("|").map(s => s.trim()).filter(Boolean);
      continue;
    }
    if (inTable && /^\|\s*-+/.test(line)) continue;
    if (inTable && line.startsWith("|")) {
      const cells = line.split("|").map(s => s.trim());
      cells.shift(); cells.pop();
      if (cells.length >= 4) {
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = cells[idx] || ""; });
        const status = (obj["Status"] || "TODO").toUpperCase().replace(/[^A-Z]/g, "");
        curSprint.features.push({
          id: obj["Feature ID"] || "",
          title: obj["Title"] || "",
          req: obj["REQ trace"] || "",
          status: STATUSES.includes(status) ? status : "TODO",
          notes: obj["Notes"] || "",
        });
      }
      continue;
    }
    if (inTable && !line.startsWith("|")) inTable = false;
  }
  return epics;
}

function tally(features) {
  const t = { TODO: 0, WIP: 0, DONE: 0, BLOCKED: 0, DEFERRED: 0, total: features.length };
  features.forEach(f => { t[f.status]++; });
  return t;
}

function bar(t) {
  if (!t.total) return `<div class="bar"></div>`;
  const pct = s => (t[s] / t.total) * 100;
  return `<div class="bar">
    <div class="done" style="width:${pct("DONE")}%"></div>
    <div class="wip" style="width:${pct("WIP")}%"></div>
    <div class="blocked" style="width:${pct("BLOCKED")}%"></div>
    <div class="deferred" style="width:${pct("DEFERRED")}%"></div>
    <div class="todo" style="width:${pct("TODO")}%"></div>
  </div>`;
}

function statsLine(t) {
  return `<div class="stats">
    <span><b>${t.DONE}</b>/${t.total} done</span>
    <span>${t.WIP} WIP</span>
    <span>${t.BLOCKED} blocked</span>
    <span>${t.DEFERRED} deferred</span>
    <span>${t.TODO} todo</span>
  </div>`;
}

function render(epics) {
  const root = document.getElementById("root");
  if (!epics.length) {
    root.innerHTML = `<div class="err">No epics parsed from backlog.md.</div>`;
    return;
  }
  let html = "";
  for (const epic of epics) {
    const allFeats = epic.sprints.flatMap(s => s.features);
    const et = tally(allFeats);
    const epct = et.total ? Math.round((et.DONE / et.total) * 100) : 0;
    html += `<div class="grid"><div class="card epic-card">
      <span class="pct">${epct}%</span>
      <div class="id">${epic.id}</div>
      <h2>${epic.title}</h2>
      ${bar(et)}
      ${statsLine(et)}
    </div></div>`;

    html += `<div class="grid">`;
    for (const sp of epic.sprints) {
      const t = tally(sp.features);
      const pct = t.total ? Math.round((t.DONE / t.total) * 100) : 0;
      html += `<div class="card">
        <span class="pct">${pct}%</span>
        <div class="id">${sp.id}</div>
        <h2>${sp.title}</h2>
        ${bar(t)}
        ${statsLine(t)}
        <details><summary>${sp.features.length} features</summary>
          <table class="feat">
            <tr><th>ID</th><th>Title</th><th>REQ</th><th>Status</th></tr>
            ${sp.features.map(f => `<tr>
              <td>${f.id}</td>
              <td>${f.title}</td>
              <td><code>${f.req}</code></td>
              <td><span class="pill ${f.status}">${f.status}</span></td>
            </tr>`).join("")}
          </table>
        </details>
      </div>`;
    }
    html += `</div>`;
  }
  root.innerHTML = html;
}

load();
</script>
</body>
</html>
