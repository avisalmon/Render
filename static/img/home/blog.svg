<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280" role="img" aria-label="Avi Salmon Blog">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f93f2"/>
      <stop offset="1" stop-color="#9ad4ff"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0b3a66" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="280" height="280" fill="url(#sky)"/>

  <!-- soft clouds -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="48" cy="232" rx="46" ry="20"/>
    <ellipse cx="96" cy="244" rx="58" ry="24"/>
    <ellipse cx="232" cy="238" rx="50" ry="22"/>
    <ellipse cx="196" cy="250" rx="40" ry="18"/>
  </g>

  <!-- newspaper sheet (back, tilted) -->
  <g transform="rotate(-12 96 120)" filter="url(#sh)">
    <rect x="58" y="78" width="84" height="104" rx="6" fill="#f4f1e9" stroke="#d9d2c2"/>
    <text x="100" y="100" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13" fill="#2a2a2a" letter-spacing="0.5">ARTICLE</text>
    <g stroke="#b9b2a4" stroke-width="3" stroke-linecap="round">
      <line x1="68" y1="116" x2="132" y2="116"/>
      <line x1="68" y1="126" x2="132" y2="126"/>
      <line x1="68" y1="136" x2="124" y2="136"/>
      <line x1="68" y1="150" x2="132" y2="150"/>
      <line x1="68" y1="160" x2="118" y2="160"/>
      <line x1="68" y1="170" x2="130" y2="170"/>
    </g>
  </g>

  <!-- newspaper sheet (front, tilted other way) -->
  <g transform="rotate(9 176 150)" filter="url(#sh)">
    <rect x="132" y="104" width="92" height="112" rx="6" fill="#fbfaf5" stroke="#ded7c7"/>
    <text x="178" y="128" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="14" fill="#222" letter-spacing="0.5">ARTICLE</text>
    <rect x="143" y="138" width="34" height="26" rx="3" fill="#9ec6ef"/>
    <g stroke="#c2bbad" stroke-width="3" stroke-linecap="round">
      <line x1="183" y1="142" x2="215" y2="142"/>
      <line x1="183" y1="152" x2="215" y2="152"/>
      <line x1="183" y1="162" x2="209" y2="162"/>
      <line x1="143" y1="176" x2="215" y2="176"/>
      <line x1="143" y1="186" x2="215" y2="186"/>
      <line x1="143" y1="196" x2="205" y2="196"/>
    </g>
  </g>
</svg>
