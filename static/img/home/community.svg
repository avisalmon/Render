<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="קהילה">
  <defs>
    <radialGradient id="cBg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#3d7264"/>
      <stop offset="100%" stop-color="#244a40"/>
    </radialGradient>
    <clipPath id="cClip"><circle cx="80" cy="80" r="80"/></clipPath>
  </defs>

  <g clip-path="url(#cClip)">
    <!-- background -->
    <rect width="160" height="160" fill="url(#cBg)"/>
    <!-- soft top glow -->
    <ellipse cx="80" cy="24" rx="78" ry="40" fill="#ffffff" opacity="0.07"/>

    <!-- chat bubble, top-right -->
    <g opacity="0.92">
      <path d="M96 30 h26 a7 7 0 0 1 7 7 v11 a7 7 0 0 1 -7 7 h-13 l-8 7 v-7 h-5 a7 7 0 0 1 -7 -7 v-11 a7 7 0 0 1 7 -7 z" fill="#f4efe4"/>
      <circle cx="103" cy="42.5" r="2.3" fill="#2f5d50"/>
      <circle cx="111" cy="42.5" r="2.3" fill="#2f5d50"/>
      <circle cx="119" cy="42.5" r="2.3" fill="#2f5d50"/>
    </g>

    <!-- three figures (back figures first; thin bg-colored stroke makes clean gaps) -->
    <!-- left -->
    <g fill="#7fb6a6" stroke="#244a40" stroke-width="3">
      <ellipse cx="44" cy="140" rx="30" ry="34"/>
      <circle cx="44" cy="92" r="15"/>
    </g>
    <!-- right -->
    <g fill="#cd8b5f" stroke="#244a40" stroke-width="3">
      <ellipse cx="116" cy="140" rx="30" ry="34"/>
      <circle cx="116" cy="92" r="15"/>
    </g>
    <!-- center, front -->
    <g fill="#f4efe4" stroke="#244a40" stroke-width="3">
      <ellipse cx="80" cy="138" rx="35" ry="40"/>
      <circle cx="80" cy="80" r="19"/>
    </g>
  </g>
</svg>
