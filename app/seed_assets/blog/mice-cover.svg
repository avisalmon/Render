<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="מחסור, משמעות וחוסן">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16302a"/>
      <stop offset="0.55" stop-color="#2f5d50"/>
      <stop offset="1" stop-color="#10201c"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#fade)"/>

  <!-- Faint "enclosure" maze motif (the mouse-utopia pen) -->
  <g stroke="#bfe3d8" stroke-opacity="0.16" stroke-width="3" fill="none">
    <rect x="70" y="70" width="1060" height="490" rx="10"/>
    <path d="M70 200 H300 V70 M300 200 H520 V330 H170 V470
             M520 70 V200 H760 V70 M760 200 V470 H1010
             M1010 70 V330 H820 V470 M1130 330 H950 V210"/>
    <circle cx="170" cy="330" r="7" fill="#bfe3d8" fill-opacity="0.18" stroke="none"/>
    <circle cx="950" cy="210" r="7" fill="#bfe3d8" fill-opacity="0.18" stroke="none"/>
  </g>

  <!-- Kicker -->
  <text x="600" y="208" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="26" letter-spacing="6" fill="#bfe3d8" fill-opacity="0.85">AVI SALMON BLOG</text>

  <!-- Title (Hebrew, RTL renders automatically) -->
  <text x="600" y="320" text-anchor="middle" font-family="'Frank Ruhl Libre',Georgia,serif"
        font-weight="700" font-size="92" fill="#f3efe6">מחסור, משמעות וחוסן</text>

  <!-- Subtitle -->
  <text x="600" y="392" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="34" fill="#dfeae4" fill-opacity="0.92">איך אתגר וחוסר מעצבים תכלית ויציבות חברתית</text>

  <!-- Hairline -->
  <rect x="500" y="430" width="200" height="3" rx="1.5" fill="#bfe3d8" fill-opacity="0.6"/>
</svg>
