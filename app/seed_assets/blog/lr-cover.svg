<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="LinkedResearch - מחקר בלי גבולות">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16302a"/>
      <stop offset="0.55" stop-color="#2f5d50"/>
      <stop offset="1" stop-color="#10201c"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#fade)"/>

  <!-- Faint network motif: nodes + edges -->
  <g stroke="#bfe3d8" stroke-opacity="0.22" stroke-width="2">
    <line x1="150" y1="470" x2="300" y2="380"/><line x1="300" y1="380" x2="240" y2="250"/>
    <line x1="300" y1="380" x2="470" y2="430"/><line x1="470" y1="430" x2="560" y2="320"/>
    <line x1="900" y1="250" x2="1010" y2="360"/><line x1="1010" y1="360" x2="950" y2="480"/>
    <line x1="900" y1="250" x2="780" y2="330"/><line x1="1010" y1="360" x2="1090" y2="250"/>
  </g>
  <g fill="#bfe3d8" fill-opacity="0.42">
    <circle cx="150" cy="470" r="8"/><circle cx="300" cy="380" r="10"/><circle cx="240" cy="250" r="7"/>
    <circle cx="470" cy="430" r="8"/><circle cx="560" cy="320" r="7"/>
    <circle cx="900" cy="250" r="8"/><circle cx="1010" cy="360" r="10"/><circle cx="950" cy="480" r="7"/>
    <circle cx="780" cy="330" r="7"/><circle cx="1090" cy="250" r="8"/>
  </g>

  <text x="600" y="200" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="26" letter-spacing="6" fill="#bfe3d8" fill-opacity="0.85">AVI SALMON BLOG</text>

  <text x="600" y="318" text-anchor="middle" font-family="'Frank Ruhl Libre',Georgia,serif"
        font-weight="700" font-size="92" fill="#f3efe6">LinkedResearch</text>

  <text x="600" y="388" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="34" fill="#dfeae4" fill-opacity="0.92">רעיון לפלטפורמה למחקר בלי גבולות</text>

  <rect x="500" y="426" width="200" height="3" rx="1.5" fill="#bfe3d8" fill-opacity="0.6"/>
</svg>
