<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="אקדמיה אקספוננציאלית">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16302a"/>
      <stop offset="0.55" stop-color="#2f5d50"/>
      <stop offset="1" stop-color="#10201c"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#fade)"/>

  <!-- Faint exponential growth curve -->
  <path d="M120 520 C 470 512, 700 480, 880 360 C 980 290, 1040 200, 1080 110"
        fill="none" stroke="#bfe3d8" stroke-opacity="0.30" stroke-width="6" stroke-linecap="round"/>
  <g fill="#bfe3d8" fill-opacity="0.5">
    <circle cx="120" cy="520" r="7"/>
    <circle cx="560" cy="502" r="7"/>
    <circle cx="820" cy="408" r="7"/>
    <circle cx="980" cy="285" r="8"/>
    <circle cx="1080" cy="110" r="10"/>
  </g>

  <text x="600" y="208" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="26" letter-spacing="6" fill="#bfe3d8" fill-opacity="0.85">AVI SALMON BLOG</text>

  <text x="600" y="322" text-anchor="middle" font-family="'Frank Ruhl Libre',Georgia,serif"
        font-weight="700" font-size="86" fill="#f3efe6">אקדמיה אקספוננציאלית</text>

  <text x="600" y="392" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="33" fill="#dfeae4" fill-opacity="0.92">מה קורה כשמחקר והוראה צומחים יחד</text>

  <rect x="500" y="430" width="200" height="3" rx="1.5" fill="#bfe3d8" fill-opacity="0.6"/>
</svg>
