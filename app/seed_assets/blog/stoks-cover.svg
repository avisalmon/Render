<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="STOKS - סורק מניות בשיטת השקעות ערך">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16302a"/>
      <stop offset="0.55" stop-color="#2f5d50"/>
      <stop offset="1" stop-color="#10201c"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#fade)"/>

  <!-- Faint bar-chart motif (the "scan") -->
  <g fill="#bfe3d8" fill-opacity="0.14">
    <rect x="120" y="430" width="42" height="90" rx="4"/>
    <rect x="178" y="392" width="42" height="128" rx="4"/>
    <rect x="236" y="446" width="42" height="74" rx="4"/>
    <rect x="294" y="356" width="42" height="164" rx="4"/>
    <rect x="922" y="420" width="42" height="100" rx="4"/>
    <rect x="980" y="372" width="42" height="148" rx="4"/>
    <rect x="1038" y="446" width="42" height="74" rx="4"/>
  </g>
  <!-- Magnifier over the bars -->
  <g stroke="#bfe3d8" stroke-opacity="0.5" stroke-width="6" fill="none">
    <circle cx="318" cy="402" r="46"/>
    <line x1="352" y1="436" x2="384" y2="468" stroke-linecap="round"/>
  </g>

  <text x="600" y="206" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="26" letter-spacing="6" fill="#bfe3d8" fill-opacity="0.85">AVI SALMON BLOG</text>

  <text x="600" y="322" text-anchor="middle" font-family="'Frank Ruhl Libre',Georgia,serif"
        font-weight="700" font-size="118" letter-spacing="6" fill="#f3efe6">STOKS</text>

  <text x="600" y="392" text-anchor="middle" font-family="'Heebo','Segoe UI',sans-serif"
        font-size="33" fill="#dfeae4" fill-opacity="0.92">סורק מניות שמחפש חברות טובות שנמכרות בזול</text>

  <rect x="500" y="430" width="200" height="3" rx="1.5" fill="#bfe3d8" fill-opacity="0.6"/>
</svg>
