<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" width="840" height="480" role="img" aria-label="עקומת אתגר–משמעות">
  <rect width="840" height="480" rx="14" fill="#faf8f3" stroke="#e4ded2"/>

  <!-- Title -->
  <text x="420" y="48" text-anchor="middle" font-family="'Frank Ruhl Libre',Georgia,serif"
        font-weight="700" font-size="26" fill="#1c1b18">אתגר מתון = שיא של משמעות וחוסן</text>

  <!-- Axes -->
  <g stroke="#9a958a" stroke-width="2">
    <line x1="110" y1="400" x2="760" y2="400"/>
    <line x1="110" y1="400" x2="110" y2="95"/>
  </g>
  <!-- Y axis label -->
  <text x="92" y="250" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="19"
        fill="#6b675f" transform="rotate(-90 92 250)">משמעות · חוסן · מוטיבציה</text>
  <!-- X axis end labels -->
  <text x="150" y="430" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="18" fill="#6b675f">אתגר נמוך</text>
  <text x="720" y="430" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="18" fill="#6b675f">אתגר גבוה</text>
  <text x="435" y="455" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="17" fill="#9a958a">← רמת האתגר / החוסר →</text>

  <!-- The inverted-U curve -->
  <path d="M120 388 C 260 388, 330 130, 435 128 C 540 130, 610 388, 750 388"
        fill="none" stroke="#2f5d50" stroke-width="5" stroke-linecap="round"/>

  <!-- Peak marker -->
  <circle cx="435" cy="128" r="8" fill="#2f5d50"/>
  <text x="435" y="106" text-anchor="middle" font-family="'Heebo',sans-serif" font-weight="700"
        font-size="20" fill="#2f5d50">אזור הפריחה</text>

  <!-- Region notes -->
  <text x="175" y="360" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="16" fill="#a23b2f">שעמום · אנומיה</text>
  <text x="700" y="360" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="16" fill="#a23b2f">עומס · שחיקה</text>
</svg>
